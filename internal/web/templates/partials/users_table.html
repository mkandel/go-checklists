{{define "users_table"}}
<table id="users-table">
	<tr><th>Name</th><th>Username</th><th>Email</th><th>Admin</th><th>Active</th></tr>
	{{range .Users}}
	<tr>
		<td>{{.Name}}</td>
		<td>{{.Username}}</td>
		<td>{{if .Email}}{{.Email}}{{end}}</td>
		<td>{{if .IsAdmin}}Yes{{end}}</td>
		<td>{{if .IsActive}}Yes{{end}}</td>
	</tr>
	{{else}}
	<tr><td colspan="5">No users yet.</td></tr>
	{{end}}
</table>
{{end}}
