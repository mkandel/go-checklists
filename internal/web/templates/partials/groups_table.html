{{define "groups_table"}}
<ul id="groups-list">
	{{range .Groups}}
	<li>
		<details hx-get="/groups/{{.ID}}/members" hx-trigger="toggle once" hx-target="find .members">
			<summary>{{.Name}}</summary>
			<div class="members">Loading…</div>
		</details>
	</li>
	{{else}}
	<li>No groups yet.</li>
	{{end}}
</ul>
{{end}}
