{{define "title"}}Set new password — {{appName}}{{end}}
{{define "content"}}
<main>
	<h1>Set new password</h1>
	<div id="reset-confirm-error" class="error"></div>
	<form class="stacked card" id="reset-confirm-form">
		<input type="hidden" id="token" name="token" value="{{.Token}}">
		<label for="password">New password</label>
		<input id="password" name="password" type="password" required minlength="8" autofocus>
		<button type="submit">Set password</button>
	</form>
</main>
<script>
	document.getElementById("reset-confirm-form").addEventListener("submit", async function (evt) {
		evt.preventDefault();
		const form = evt.target;
		const errorEl = document.getElementById("reset-confirm-error");
		errorEl.textContent = "";
		const body = {
			token: form.token.value,
			password: form.password.value,
		};
		const resp = await fetch("/password-reset/confirm", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify(body),
		});
		if (resp.ok) {
			window.location = "/checklists";
		} else {
			errorEl.textContent = (await resp.text()) || "Could not reset password.";
		}
	});
</script>
{{end}}
