openapi: 3.0.3
info:
  title: ChecklistHQ API
  description: >-
    JSON API for ChecklistHQ (auth, checklists, notifications, users,
    templates, groups, tenant admin). Generated by hand from
    internal/api/*.go — see DESIGN.md for the broader system design.


    Auth model: cookie-based sessions (`checklists_session`, HttpOnly) set by
    login/register/password-reset-confirm. Every non-GET/HEAD request also
    requires a `X-CSRF-Token` header matching the (non-HttpOnly)
    `checklists_csrf` cookie value — a double-submit CSRF check — EXCEPT
    `/login`, `/register`, `/password-reset/request`, and
    `/password-reset/confirm`, which are unauthenticated by design and exempt.
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Local API (default api_port)

security:
  - sessionCookie: []

tags:
  - name: Health
  - name: Auth
  - name: Me
  - name: Checklists
  - name: Notifications
  - name: Users
  - name: Templates
  - name: Groups
  - name: Tenant Admin

paths:
  /api/healthz:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK — process is up and the database is reachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string, example: dev }
                  db: { type: string, example: ok }
        "503":
          description: Database unreachable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: error }
                  version: { type: string, example: dev }
                  db: { type: string, example: error }
                  error: { type: string, example: database unreachable }

  /register:
    post:
      tags: [Auth]
      summary: Self-service registration
      description: >-
        Anyone may create an ordinary (non-admin) account for themselves.
        Not CSRF-gated. On success, sets session + CSRF cookies (logs the
        new user in).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Bad request (missing fields, password too short) }

  /login:
    post:
      tags: [Auth]
      summary: Log in
      description: >-
        Form-encoded (not JSON). Not CSRF-gated. Rate-limited to 5
        attempts/15min per client IP. On success, sets session + CSRF
        cookies.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
              required: [username, password]
      responses:
        "204": { description: No Content — logged in }
        "401": { description: Invalid credentials }
        "429": { description: Too many login attempts }

  /logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Clears session + CSRF cookies regardless of prior session validity.
      responses:
        "204": { description: No Content }

  /password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: >-
        Always responds 204 regardless of whether the username exists or is
        emailable (enumeration-safe). Not CSRF-gated. Rate-limited to
        5/15min per client IP.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username: { type: string }
              required: [username]
      responses:
        "204": { description: No Content }
        "429": { description: Too many requests }

  /password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm a password reset
      description: >-
        Not CSRF-gated (proves identity via the possession of an unguessable
        token, mailed out by the request step). On success, also logs the
        user in (sets session + CSRF cookies).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
              required: [token, password]
      responses:
        "204": { description: No Content }
        "400": { description: Invalid/expired token, or password too short }

  /api/me:
    get:
      tags: [Me]
      summary: Get the current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { description: Unauthorized }

  /api/checklists:
    post:
      tags: [Checklists]
      summary: Create a checklist
      description: >-
        Supply `template_id` to instantiate the checklist from that
        template's latest version.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChecklistRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "400": { description: Bad request (invalid assignment, validation error) }
        "403": { description: Checklist creation is restricted and caller isn't allowed to create one }
    get:
      tags: [Checklists]
      summary: List checklists relevant to the caller
      description: >-
        Returns checklists the caller created, approves, is directly
        assigned, or could claim (unclaimed group assignment).
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [open, validating, complete] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Checklist" }
        "400": { description: Invalid status value }

  /api/checklists/{id}:
    get:
      tags: [Checklists]
      summary: Get a checklist
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "404": { description: Not found, or not visible to the caller }

  /api/checklists/{id}/claim:
    post:
      tags: [Checklists]
      summary: Claim a checklist
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expected_current_user_id:
                  type: integer
                  format: int64
                  nullable: true
                  description: Optional optimistic-concurrency check.
      responses:
        "204": { description: Claimed }
        "409": { description: Claimed by someone else first }

  /api/checklists/{id}/items/{itemID}/check:
    post:
      tags: [Checklists]
      summary: Check an item
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/ItemId"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "404": { description: Checklist or item not found }
        "409": { description: Checklist not open, or unclaimed }

  /api/checklists/{id}/items/{itemID}/checked:
    put:
      tags: [Checklists]
      summary: Explicitly set an item's checked state
      description: Unlike POST .../check (always checks), this can also uncheck.
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/ItemId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checked: { type: boolean }
              required: [checked]
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "404": { description: Checklist or item not found }
        "409": { description: Checklist not open, or unclaimed }

  /api/checklists/{id}/approve:
    post:
      tags: [Checklists]
      summary: Approve a checklist
      description: Requires the checklist to be validating and the caller to be its approver.
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "403": { description: Caller isn't the approver }
        "409": { description: Checklist isn't in the validating state }

  /api/checklists/{id}/reject:
    post:
      tags: [Checklists]
      summary: Reject specific items back to open
      description: Requires the caller to be the checklist's approver.
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item_ids:
                  type: array
                  items: { type: integer, format: int64 }
              required: [item_ids]
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "403": { description: Caller isn't the approver }
        "404": { description: One of the item ids isn't on the checklist }

  /api/checklists/{id}/items:
    post:
      tags: [Checklists]
      summary: Add an item
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                validation_ref: { type: string }
              required: [name]
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }

  /api/checklists/{id}/items/{itemID}:
    delete:
      tags: [Checklists]
      summary: Remove an item
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/ItemId"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "404": { description: Checklist or item not found }

  /api/checklists/{id}/items/order:
    put:
      tags: [Checklists]
      summary: Reorder items
      description: item_ids must be the full set of the checklist's item IDs, in the desired order.
      parameters:
        - $ref: "#/components/parameters/ChecklistId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item_ids:
                  type: array
                  items: { type: integer, format: int64 }
              required: [item_ids]
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checklist" }
        "400": { description: Invalid reorder (missing/extra/duplicate ids) }

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the caller
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notification" }

  /api/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a notification read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204": { description: No Content }
        "404": { description: Notification not found, or not owned by the caller }

  /api/users:
    get:
      tags: [Users]
      summary: List users in the caller's tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /api/admin/users:
    post:
      tags: [Users]
      summary: "Admin: create a user"
      description: Requires the caller to be an admin.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Missing required fields }
        "403": { description: Caller isn't an admin }
        "409": { description: Username already taken }

  /api/admin/users/bulk:
    post:
      tags: [Users]
      summary: "Admin: bulk-create users from CSV"
      description: >-
        Raw CSV body, NO header row. Columns:
        username,password,name[,is_admin[,email]]. Requires admin. Rows are
        processed independently — a bad row doesn't abort the batch.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
              example: |
                carol,hunter22,Carol Example,false,carol@example.com
                dave,hunter22,Dave Example,true,dave@example.com
      responses:
        "200":
          description: Per-row results
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BulkCreateUserResult" }
        "400": { description: Malformed CSV }
        "403": { description: Caller isn't an admin }

  /api/templates:
    get:
      tags: [Templates]
      summary: List templates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Template" }
    post:
      tags: [Templates]
      summary: Create a new template version
      description: >-
        Requires admin. Creating with an existing name adds a new version
        rather than replacing the old one.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTemplateVersionRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateResponse" }
        "403": { description: Caller isn't an admin }

  /api/templates/{id}:
    get:
      tags: [Templates]
      summary: Get a template by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateResponse" }
        "404": { description: Not found }

  /api/templates/latest/{name}:
    get:
      tags: [Templates]
      summary: Get the latest version of a template by name
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateResponse" }
        "404": { description: Not found }

  /api/groups:
    get:
      tags: [Groups]
      summary: List groups
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Group" }
    post:
      tags: [Groups]
      summary: Create a group
      description: Requires admin.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "403": { description: Caller isn't an admin }

  /api/groups/{id}/members:
    get:
      tags: [Groups]
      summary: List a group's members
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "404": { description: Group not found }
    post:
      tags: [Groups]
      summary: Add a member to a group
      description: Requires admin.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: integer, format: int64 }
              required: [user_id]
      responses:
        "204": { description: No Content }
        "403": { description: Caller isn't an admin }
        "404": { description: Group or user not found }

  /api/groups/{id}/members/{userID}:
    delete:
      tags: [Groups]
      summary: Remove a member from a group
      description: Requires admin.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: userID
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204": { description: No Content }
        "403": { description: Caller isn't an admin }
        "404": { description: Group or membership not found }

  /api/admin/tenant/mail-config:
    get:
      tags: [Tenant Admin]
      summary: Get the tenant's SMTP config
      description: Requires admin. Password is never returned — see `configured`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantMailConfigResponse" }
        "403": { description: Caller isn't an admin }
    put:
      tags: [Tenant Admin]
      summary: Update the tenant's SMTP config
      description: >-
        Requires admin. Leave `password` empty to keep the existing stored
        password unchanged; all other fields are full-replace/required.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTenantMailConfigRequest" }
      responses:
        "204": { description: No Content }
        "400": { description: Missing required field }
        "403": { description: Caller isn't an admin }

  /api/admin/tenant/checklist-policy:
    get:
      tags: [Tenant Admin]
      summary: Get the tenant's checklist-creation policy
      description: Requires admin.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChecklistPolicyResponse" }
        "403": { description: Caller isn't an admin }
    put:
      tags: [Tenant Admin]
      summary: Update the tenant's checklist-creation policy
      description: >-
        Requires admin. `creator_group_id` is required when `restrict` is
        true; set `restrict: false` and `creator_group_id: null` to lift the
        restriction.
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChecklistPolicyResponse" }
      responses:
        "204": { description: No Content }
        "400": { description: restrict is true but creator_group_id is missing }
        "403": { description: Caller isn't an admin }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: checklists_session
      description: >-
        Set by /login, /register, and /password-reset/confirm. Every
        non-safe-method request also needs a matching X-CSRF-Token header —
        see the CsrfToken parameter on each mutating operation.

  parameters:
    ChecklistId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ItemId:
      name: itemID
      in: path
      required: true
      schema: { type: integer, format: int64 }
    GroupId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
      description: Must equal the value of the checklists_csrf cookie (double-submit CSRF check).

  schemas:
    User:
      type: object
      description: domain.User — field names are Go's default PascalCase JSON (no json tags on this struct, except PasswordHash which is never serialized).
      properties:
        ID: { type: integer, format: int64 }
        TenantID: { type: integer, format: int64 }
        Name: { type: string }
        Username: { type: string }
        Email: { type: string, nullable: true }
        IsAdmin: { type: boolean }
        IsActive: { type: boolean }

    Group:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        TenantID: { type: integer, format: int64 }
        Name: { type: string }

    Template:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        TenantID: { type: integer, format: int64 }
        Name: { type: string }
        Version: { type: integer }

    TemplateItem:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        TemplateID: { type: integer, format: int64 }
        Name: { type: string }
        Position: { type: integer }
        ValidationRef: { type: string }

    TemplateResponse:
      description: A Template with its items embedded (Template's fields promote to the top level; only "items" uses a json tag).
      allOf:
        - $ref: "#/components/schemas/Template"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/TemplateItem" }

    ChecklistItem:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        ChecklistID: { type: integer, format: int64 }
        Name: { type: string }
        Position: { type: integer }
        Checked: { type: boolean }
        CheckedBy: { type: integer, format: int64, nullable: true }
        CheckedAt: { type: string, format: date-time, nullable: true }
        ValidationRef: { type: string }
        AssigneeOverrideUserID:
          type: integer
          format: int64
          nullable: true
          description: Set only via the reject flow — points at whoever originally checked this item.

    Checklist:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        TenantID: { type: integer, format: int64 }
        TemplateID: { type: integer, format: int64, nullable: true }
        CreatorID: { type: integer, format: int64 }
        AssignedGroupID: { type: integer, format: int64, nullable: true }
        AssignedUserID: { type: integer, format: int64, nullable: true }
        Hidden: { type: boolean }
        ApproverID: { type: integer, format: int64, nullable: true }
        Status: { type: string, enum: [open, validating, complete] }
        CreatedAt: { type: string, format: date-time }
        Items:
          type: array
          items: { $ref: "#/components/schemas/ChecklistItem" }

    Notification:
      type: object
      properties:
        ID: { type: integer, format: int64 }
        TenantID: { type: integer, format: int64 }
        RecipientUserID: { type: integer, format: int64 }
        Type: { type: string }
        ChecklistID: { type: integer, format: int64, nullable: true }
        ActorUserID: { type: integer, format: int64, nullable: true }
        Message: { type: string }
        ReadAt: { type: string, format: date-time, nullable: true }
        EmailStatus: { type: string, enum: [pending, sent, failed, skipped] }
        EmailAttempts: { type: integer }
        EmailLastError: { type: string, nullable: true }
        EmailSentAt: { type: string, format: date-time, nullable: true }

    RegisterRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string, minLength: 8 }
        name: { type: string }
        email: { type: string }
      required: [username, password, name]

    CreateUserRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        name: { type: string }
        email: { type: string }
        is_admin: { type: boolean }
      required: [username, password, name]

    BulkCreateUserResult:
      type: object
      properties:
        row: { type: integer }
        username: { type: string }
        status: { type: string, enum: [created, error] }
        error: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [row, status]

    CreateChecklistRequest:
      type: object
      properties:
        template_id:
          type: integer
          format: int64
          description: The checklist is instantiated from this template's latest version.
        assigned_group_id: { type: integer, format: int64, nullable: true }
        assigned_user_id: { type: integer, format: int64, nullable: true }
        hidden: { type: boolean }
        approver_id: { type: integer, format: int64, nullable: true }
      required: [template_id]

    CreateTemplateVersionItem:
      type: object
      properties:
        name: { type: string }
        validation_ref: { type: string }
      required: [name]

    CreateTemplateVersionRequest:
      type: object
      properties:
        name: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/CreateTemplateVersionItem" }
      required: [name]

    TenantMailConfigResponse:
      type: object
      properties:
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        from_address: { type: string }
        configured: { type: boolean }

    UpdateTenantMailConfigRequest:
      type: object
      properties:
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password:
          type: string
          description: Empty string means "keep the existing stored password".
        from_address: { type: string }
      required: [host, port, username, from_address]

    ChecklistPolicyResponse:
      type: object
      properties:
        restrict: { type: boolean }
        creator_group_id:
          type: integer
          format: int64
          nullable: true
          description: Required (non-null) when restrict is true.
      required: [restrict]
