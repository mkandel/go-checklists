services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: checklists
      POSTGRES_PASSWORD: checklists
      POSTGRES_DB: checklists
    ports:
      - "5432:5432"
    volumes:
      - checklists_pgdata:/var/lib/postgresql/data

  # Reverse proxy fronting the web UI on :80/:443. The app itself (not
  # containerized here) listens on the unprivileged WEB_PORT (default
  # 8081); see the Caddyfile for the forwarding rule and TLS notes.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  checklists_pgdata:
  caddy_data:
